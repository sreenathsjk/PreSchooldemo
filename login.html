<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin Login | Baby Star Coaching Center</title>
<link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@400;600;700;800&family=Nunito:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<style>
  :root {
    --yellow: #FFD94A;
    --orange: #FF8C42;
    --pink: #FF6B9D;
    --blue: #4ECDC4;
    --white: #FFFFFF;
    --cream: #FFFBF0;
    --dark: #1E1E2E;
    --gray: #6B7280;
    --font-heading: 'Baloo 2', cursive;
    --font-body: 'Nunito', sans-serif;
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { height: 100%; font-family: var(--font-body); }

  body {
    min-height: 100vh;
    background: linear-gradient(135deg, #1E1E2E 0%, #2D1B4E 50%, #1A2E3B 100%);
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 20px;
    position: relative;
    overflow: hidden;
  }

  /* Animated background orbs */
  .bg-orb {
    position: absolute;
    border-radius: 50%;
    filter: blur(80px);
    opacity: 0.25;
    animation: orbFloat ease-in-out infinite;
    pointer-events: none;
  }
  .orb-1 { width: 400px; height: 400px; background: var(--orange); top: -100px; right: -100px; animation-duration: 18s; }
  .orb-2 { width: 300px; height: 300px; background: var(--pink); bottom: -80px; left: -80px; animation-duration: 22s; animation-delay: -8s; }
  .orb-3 { width: 200px; height: 200px; background: var(--blue); top: 50%; left: 5%; animation-duration: 15s; animation-delay: -4s; }

  @keyframes orbFloat {
    0%,100% { transform: translateY(0) scale(1); }
    50% { transform: translateY(-40px) scale(1.1); }
  }

  /* Stars BG */
  .stars { position: absolute; inset: 0; pointer-events: none; }
  .star {
    position: absolute;
    background: white;
    border-radius: 50%;
    animation: twinkle ease-in-out infinite;
  }
  @keyframes twinkle {
    0%,100% { opacity: 0.2; transform: scale(1); }
    50% { opacity: 1; transform: scale(1.4); }
  }

  /* Login Card */
  .login-card {
    background: rgba(255,255,255,0.06);
    backdrop-filter: blur(24px);
    -webkit-backdrop-filter: blur(24px);
    border: 1.5px solid rgba(255,255,255,0.15);
    border-radius: 28px;
    padding: 48px 44px;
    width: 100%;
    max-width: 460px;
    position: relative;
    z-index: 10;
    box-shadow: 0 32px 80px rgba(0,0,0,0.4), inset 0 1px 0 rgba(255,255,255,0.1);
    animation: cardIn 0.7s cubic-bezier(.34,1.56,.64,1) both;
  }

  @keyframes cardIn {
    from { opacity: 0; transform: translateY(40px) scale(0.95); }
    to { opacity: 1; transform: translateY(0) scale(1); }
  }

  .login-logo {
    text-align: center;
    margin-bottom: 36px;
  }

  .logo-badge {
    width: 80px; height: 80px;
    background: linear-gradient(135deg, var(--yellow), var(--orange));
    border-radius: 22px;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    font-size: 38px;
    margin-bottom: 16px;
    box-shadow: 0 8px 28px rgba(255,140,66,0.45);
    animation: logoBounce 3s ease-in-out infinite;
  }

  @keyframes logoBounce {
    0%,100% { transform: translateY(0) rotate(-3deg); }
    50% { transform: translateY(-6px) rotate(3deg); }
  }

  .login-logo h1 {
    font-family: var(--font-heading);
    font-size: 1.4rem;
    font-weight: 800;
    color: white;
    margin-bottom: 4px;
  }

  .login-logo p {
    font-size: 0.82rem;
    color: rgba(255,255,255,0.5);
    font-weight: 600;
    letter-spacing: 0.5px;
  }

  .login-title {
    font-family: var(--font-heading);
    font-size: 1.1rem;
    font-weight: 700;
    color: rgba(255,255,255,0.9);
    margin-bottom: 24px;
    text-align: center;
    display: flex;
    align-items: center;
    gap: 8px;
    justify-content: center;
  }

  .login-title::before,
  .login-title::after {
    content: '';
    flex: 1;
    height: 1px;
    background: rgba(255,255,255,0.15);
  }

  .form-group {
    margin-bottom: 18px;
  }

  .form-group label {
    display: block;
    font-size: 0.82rem;
    font-weight: 700;
    color: rgba(255,255,255,0.7);
    margin-bottom: 8px;
    letter-spacing: 0.5px;
    text-transform: uppercase;
  }

  .input-wrap {
    position: relative;
  }

  .input-icon {
    position: absolute;
    left: 16px;
    top: 50%;
    transform: translateY(-50%);
    color: rgba(255,255,255,0.4);
    font-size: 15px;
    pointer-events: none;
    transition: color 0.2s;
  }

  .form-group input {
    width: 100%;
    background: rgba(255,255,255,0.08);
    border: 1.5px solid rgba(255,255,255,0.15);
    border-radius: 14px;
    padding: 14px 16px 14px 46px;
    font-family: var(--font-body);
    font-size: 0.95rem;
    font-weight: 600;
    color: white;
    outline: none;
    transition: all 0.25s;
  }

  .form-group input::placeholder { color: rgba(255,255,255,0.3); }

  .form-group input:focus {
    border-color: var(--orange);
    background: rgba(255,140,66,0.1);
    box-shadow: 0 0 0 3px rgba(255,140,66,0.15);
  }

  .form-group input:focus + .input-icon,
  .input-wrap:focus-within .input-icon { color: var(--orange); }

  .input-icon { left: 16px; }
  .form-group input { padding-left: 46px; }

  .toggle-pass {
    position: absolute;
    right: 14px;
    top: 50%;
    transform: translateY(-50%);
    background: none;
    border: none;
    color: rgba(255,255,255,0.4);
    cursor: pointer;
    font-size: 15px;
    padding: 4px;
    transition: color 0.2s;
  }
  .toggle-pass:hover { color: var(--orange); }

  .btn-login {
    width: 100%;
    background: linear-gradient(135deg, var(--orange), var(--pink));
    border: none;
    border-radius: 14px;
    padding: 16px;
    font-family: var(--font-body);
    font-size: 1rem;
    font-weight: 800;
    color: white;
    cursor: pointer;
    transition: all 0.3s;
    box-shadow: 0 6px 24px rgba(255,140,66,0.4);
    margin-top: 8px;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 10px;
    position: relative;
    overflow: hidden;
  }

  .btn-login::before {
    content: '';
    position: absolute;
    inset: 0;
    background: white;
    opacity: 0;
    transition: opacity 0.2s;
  }
  .btn-login:hover { transform: translateY(-2px); box-shadow: 0 10px 32px rgba(255,140,66,0.55); }
  .btn-login:hover::before { opacity: 0.08; }
  .btn-login:active { transform: translateY(0); }
  .btn-login:disabled { opacity: 0.6; cursor: not-allowed; transform: none; }

  .spinner {
    width: 18px; height: 18px;
    border: 2.5px solid rgba(255,255,255,0.3);
    border-top-color: white;
    border-radius: 50%;
    animation: spin 0.7s linear infinite;
    display: none;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  .error-msg {
    background: rgba(255,107,107,0.15);
    border: 1.5px solid rgba(255,107,107,0.4);
    border-radius: 12px;
    padding: 12px 16px;
    font-size: 0.85rem;
    font-weight: 600;
    color: #FF8888;
    margin-top: 16px;
    display: none;
    align-items: center;
    gap: 8px;
  }

  .success-msg {
    background: rgba(107,203,119,0.15);
    border: 1.5px solid rgba(107,203,119,0.4);
    border-radius: 12px;
    padding: 12px 16px;
    font-size: 0.85rem;
    font-weight: 600;
    color: #6BCB77;
    margin-top: 16px;
    display: none;
    align-items: center;
    gap: 8px;
  }

  .login-footer {
    text-align: center;
    margin-top: 28px;
    padding-top: 24px;
    border-top: 1px solid rgba(255,255,255,0.1);
  }

  .login-footer a {
    color: rgba(255,255,255,0.5);
    font-size: 0.82rem;
    font-weight: 600;
    text-decoration: none;
    transition: color 0.2s;
    display: inline-flex;
    align-items: center;
    gap: 6px;
  }

  .login-footer a:hover { color: var(--yellow); }

  .hint-box {
    background: rgba(255,217,74,0.08);
    border: 1px solid rgba(255,217,74,0.2);
    border-radius: 12px;
    padding: 12px 16px;
    margin-bottom: 20px;
    font-size: 0.82rem;
    color: rgba(255,255,255,0.5);
    font-weight: 500;
    text-align: center;
  }
  .hint-box strong { color: var(--yellow); }
</style>
</head>
<body>

<!-- Background decorations -->
<div class="bg-orb orb-1"></div>
<div class="bg-orb orb-2"></div>
<div class="bg-orb orb-3"></div>
<div class="stars" id="starsContainer"></div>

<div class="login-card">
  <div class="login-logo">
    <div class="logo-badge">⭐</div>
    <h1>Baby Star Admin</h1>
    <p>COACHING CENTER MANAGEMENT SYSTEM</p>
  </div>

  <div class="login-title">Principal Login</div>

  <div class="hint-box">
    <strong>First time?</strong> Set up your admin account in Firebase Console, then login here.
  </div>

  <form id="loginForm">
    <div class="form-group">
      <label>Email Address</label>
      <div class="input-wrap">
        <i class="fas fa-envelope input-icon"></i>
        <input type="email" id="emailInput" placeholder="principal@babystar.in" required autocomplete="email">
      </div>
    </div>

    <div class="form-group">
      <label>Password</label>
      <div class="input-wrap">
        <i class="fas fa-lock input-icon"></i>
        <input type="password" id="passInput" placeholder="••••••••" required autocomplete="current-password">
        <button type="button" class="toggle-pass" onclick="togglePassword()">
          <i class="fas fa-eye" id="eyeIcon"></i>
        </button>
      </div>
    </div>

    <button type="submit" class="btn-login" id="loginBtn">
      <div class="spinner" id="loginSpinner"></div>
      <i class="fas fa-sign-in-alt" id="loginIcon"></i>
      <span id="loginText">Sign In to Dashboard</span>
    </button>

    <div class="error-msg" id="errorMsg">
      <i class="fas fa-exclamation-circle"></i>
      <span id="errorText">Invalid credentials.</span>
    </div>
    <div class="success-msg" id="successMsg">
      <i class="fas fa-check-circle"></i>
      <span>Login successful! Redirecting...</span>
    </div>
  </form>

  <div class="login-footer">
    <a href="index.html"><i class="fas fa-arrow-left"></i> Back to School Website</a>
  </div>
</div>

<!-- Firebase SDK -->
<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
  import { getAuth, signInWithEmailAndPassword, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

  // ─── FIREBASE CONFIG ───
  // Replace these values with your actual Firebase project config
   const firebaseConfig = {
  apiKey: "AIzaSyAWJ2M_lJmMUWfFDbItiRh73RRvIGXSYSg",
  authDomain: "preschooldemo-e350e.firebaseapp.com",
  projectId: "preschooldemo-e350e",
  storageBucket: "preschooldemo-e350e.firebasestorage.app",
  messagingSenderId: "1053542139222",
  appId: "1:1053542139222:web:6fc6265efc6ed3bde8c2f7"
};

  const app = initializeApp(firebaseConfig);
  const auth = getAuth(app);

  // If already logged in, redirect to dashboard
  onAuthStateChanged(auth, (user) => {
    if (user) {
      window.location.href = 'dashboard.html';
    }
  });

  // ─── LOGIN HANDLER ───
  document.getElementById('loginForm').addEventListener('submit', async (e) => {
    e.preventDefault();

    const email = document.getElementById('emailInput').value.trim();
    const password = document.getElementById('passInput').value;
    const btn = document.getElementById('loginBtn');
    const spinner = document.getElementById('loginSpinner');
    const loginIcon = document.getElementById('loginIcon');
    const loginText = document.getElementById('loginText');
    const errorMsg = document.getElementById('errorMsg');
    const successMsg = document.getElementById('successMsg');

    // Loading state
    btn.disabled = true;
    spinner.style.display = 'block';
    loginIcon.style.display = 'none';
    loginText.textContent = 'Signing in...';
    errorMsg.style.display = 'none';
    successMsg.style.display = 'none';

    try {
      await signInWithEmailAndPassword(auth, email, password);
      successMsg.style.display = 'flex';
      loginText.textContent = 'Redirecting...';
      setTimeout(() => { window.location.href = 'dashboard.html'; }, 1000);
    } catch (err) {
      let msg = 'Login failed. Please try again.';
      if (err.code === 'auth/user-not-found') msg = 'No admin account found with this email.';
      else if (err.code === 'auth/wrong-password') msg = 'Incorrect password. Please try again.';
      else if (err.code === 'auth/invalid-email') msg = 'Invalid email address format.';
      else if (err.code === 'auth/too-many-requests') msg = 'Too many failed attempts. Please wait before retrying.';
      else if (err.code === 'auth/network-request-failed') msg = 'Network error. Check your internet connection.';
      else if (err.code === 'auth/invalid-credential') msg = 'Invalid credentials. Please check email and password.';

      document.getElementById('errorText').textContent = msg;
      errorMsg.style.display = 'flex';

      // Reset button
      btn.disabled = false;
      spinner.style.display = 'none';
      loginIcon.style.display = 'inline';
      loginText.textContent = 'Sign In to Dashboard';
    }
  });

  // ─── TOGGLE PASSWORD ───
  window.togglePassword = function() {
    const input = document.getElementById('passInput');
    const icon = document.getElementById('eyeIcon');
    if (input.type === 'password') {
      input.type = 'text';
      icon.className = 'fas fa-eye-slash';
    } else {
      input.type = 'password';
      icon.className = 'fas fa-eye';
    }
  };

  // ─── GENERATE STARS ───
  const starsContainer = document.getElementById('starsContainer');
  for (let i = 0; i < 60; i++) {
    const star = document.createElement('div');
    star.className = 'star';
    const size = Math.random() * 3 + 1;
    star.style.cssText = `
      width:${size}px; height:${size}px;
      top:${Math.random()*100}%; left:${Math.random()*100}%;
      animation-duration:${Math.random()*3+2}s;
      animation-delay:${Math.random()*4}s;
    `;
    starsContainer.appendChild(star);
  }
</script>
</body>
</html>
